user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Uploads : autoriser des fichiers jusqu'à 100 Mo (cohérent avec l'UI et uploads.ini).
    # La marge (105m) couvre le reste du multipart (texte du post, en-têtes).
    client_max_body_size 105m;

    # Un upload de 100 Mo peut dépasser les timeouts par défaut (60 s) sur une
    # connexion lente : sans ça la requête est coupée en cours de transfert.
    client_body_timeout 300s;
    send_timeout 300s;

    # Dossiers temporaires accessibles en écriture par le worker (www-data)
    client_body_temp_path /var/cache/nginx/client_temp;
    fastcgi_temp_path     /var/cache/nginx/fastcgi_temp;
    proxy_temp_path       /var/cache/nginx/proxy_temp;

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;

        server_name _;
        root /var/www/html;
        index index.php index.html index.htm;

        # Serve static files directly
        location ~* ^.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt)$ {
            access_log off;
            expires 7d;
        }

        # Route all PHP files to PHP-FPM
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            # Aligné sur max_execution_time (uploads.ini) : PHP doit avoir le temps
            # de déplacer un fichier de 100 Mo avant que nginx ne coupe.
            fastcgi_read_timeout 300s;
            include fastcgi_params;
        }

        # Default fallback for non-PHP requests
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
