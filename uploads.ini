; Limites d'upload PHP (cohérentes avec l'UI : 40 Mo par image, 100 Mo par vidéo)
upload_max_filesize = 100M
post_max_size = 105M
; memory_limit / max_execution_time relevés : un upload de 100 Mo prend plus de
; 60 s sur une connexion domestique, et PHP doit pouvoir déplacer le fichier.
memory_limit = 256M
max_execution_time = 300
max_file_uploads = 20
